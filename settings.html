<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Care - Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0" />
</head>
<body>

    <div class="mobile-container">
        
        <header class="app-header">
            <button class="back-btn" onclick="navigateTo('index.html')">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </button>
            <h1>Settings</h1>
            <div class="spacer"></div> </header>

       <main>
            <div class="settings-group">
                <h3 class="settings-title">Accessibility Controls</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Text Size</span>
                        <div class="size-selector">
                            <span id="textSizeS" onclick="changeTextSize('S')">S</span>
                            <span id="textSizeM" class="active" onclick="changeTextSize('M')">M</span>
                            <span id="textSizeL" onclick="changeTextSize('L')">L</span>
                        </div>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>High Contrast Mode</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="contrastToggle" onchange="toggleContrast(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h3 class="settings-title">Interaction Preferences</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Silent Mode</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="silentToggle" onchange="toggleSilentMode(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>Voice Selection</span>
                        <div class="voice-selector">
                            <span class="material-symbols-rounded">expand_more</span>
                            <span>Neutral</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h3 class="settings-title">Privacy & Data</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Consent Agreement</span>
                        <button class="btn-icon-green" onclick="alert('Consent Agreement Modal would open here.')">
                            <span class="material-symbols-rounded">link</span>
                        </button>
                    </div>
                </div>
            </div>

            <button class="btn-delete" onclick="deleteLocalData()">
                Delete Local Data
            </button>
        </main>

    </div>
    <script src="script.js"></script>
</body>
</html>
