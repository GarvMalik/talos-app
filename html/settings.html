<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Care - Settings</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0" />
</head>
<body>
    <div class="mobile-container">
        <header class="app-header">
            <button class="back-btn" data-navigate="../index.html">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </button>
            <h1>Settings</h1>
            <div class="spacer"></div> 
        </header>

       <main>
            <div class="settings-group">
                <h3 class="settings-title">Accessibility Controls</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Text Size</span>
                        <div class="size-selector">
                            <span id="textSizeS" data-size="S">S</span>
                            <span id="textSizeM" class="active" data-size="M">M</span>
                            <span id="textSizeL" data-size="L">L</span>
                        </div>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>High Contrast Mode</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="contrastToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h3 class="settings-title">Voice & Interaction</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Silent Mode (Mute AI)</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="silentModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>Spoken Language</span>
                        <select id="languageSelect" class="settings-dropdown">
                            <option value="en-US">English</option>
                            <option value="fi-FI">Finnish</option>
                            <option value="sv-SE">Swedish</option>
                        </select>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>Voice Type</span>
                        <select id="voiceTypeSelect" class="settings-dropdown">
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                            <option value="neutral">Neutral</option>
                        </select>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row justify-center mt-10">
                        <button class="btn-action-light btn-green-text w-full-padded" id="btnTestVoice">
                            Test Voice Output
                        </button>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h3 class="settings-title">Privacy & Data</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Consent Agreement</span>
                        <button class="btn-icon-green" id="btnConsent">
                            <span class="material-symbols-rounded">link</span>
                        </button>
                    </div>
                </div>
            </div>

            <button class="btn-delete" id="btnDeleteLocalData">
                Delete Local Data
            </button>
        </main>
    </div>

    <script src="../js/global.js"></script>
    <script src="../js/tts.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
