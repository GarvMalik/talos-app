<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Care - Settings</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0" />
</head>
<body>
    <div class="mobile-container">
        <header class="app-header">
            <button class="back-btn" data-navigate="../index.html">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </button>
            <h1>Settings</h1>
            <div class="spacer"></div>
        </header>

        <main>

            <div class="settings-group">
                <h3 class="settings-title">Display</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Text Size</span>
                        <div class="size-selector">
                            <span data-size="S">S</span>
                            <span class="active" data-size="M">M</span>
                            <span data-size="L">L</span>
                        </div>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>High Contrast</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="contrastToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h3 class="settings-title">Voice</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Mute AI Voice</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="silentModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>Language</span>
                        <select id="languageSelect" class="settings-dropdown">
                            <option value="en-US">English</option>
                            <option value="fi-FI">Finnish</option>
                            <option value="sv-SE">Swedish</option>
                        </select>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>Voice</span>
                        <select id="voiceTypeSelect" class="settings-dropdown">
                            <option value="female">Sarah (F)</option>
                            <option value="male">Liam (M)</option>
                            <option value="neutral">Bill (N)</option>
                        </select>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row settings-row-column">
                        <div class="settings-key-header">
                            <span>ElevenLabs Key</span>
                            <span class="settings-badge">High quality</span>
                        </div>
                        <input type="password" id="elevenLabsKeyInput" class="settings-key-input" placeholder="Paste API key for natural voice" autocomplete="off">
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row justify-center">
                        <button class="btn-action-light btn-green-text w-full-padded" id="btnTestVoice">
                            Test Voice
                        </button>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <h3 class="settings-title">Privacy</h3>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>Consent Agreement</span>
                        <button class="btn-icon-green" id="btnConsent">
                            <span class="material-symbols-rounded">link</span>
                        </button>
                    </div>
                </div>
            </div>

            <button class="btn-delete" id="btnDeleteLocalData">Delete All Data</button>

        </main>
    </div>

    <script src="../js/global.js"></script>
    <script src="../js/tts.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
