<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talos Care - Chat</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0" />
</head>
<body class="chat-layout">
    <div class="mobile-container">

        <header class="app-header">
            <button class="back-btn" data-navigate="../index.html">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </button>
            <h1 class="flex-center-gap">
                Talos
                <span class="material-symbols-rounded icon-lock">lock</span>
            </h1>
            <button id="voiceModeBtn" class="voice-mode-btn" title="Voice conversation mode">
                <span class="material-symbols-rounded">graphic_eq</span>
            </button>
        </header>

        <!-- Text chat area -->
        <main class="chat-area" id="chatContainer">
            <div class="chat-history" id="chatHistory"></div>
        </main>

        <!-- Text input -->
        <div class="chat-input-wrapper" id="inputWrapper">
            <div id="activeInputArea">
                <div class="quick-replies">
                    <button class="btn-quick-reply" data-quick-reply="Prefer not to answer">Prefer not to answer</button>
                    <button class="btn-quick-reply" data-quick-reply="Skip this question">Skip this question</button>
                </div>
                <div class="input-box">
                    <textarea id="chatInput" rows="1" placeholder="Type your answer..."></textarea>
                    <button class="btn-mic" id="micButton" title="Voice input">
                        <span class="material-symbols-rounded">mic</span>
                    </button>
                    <button class="btn-send" id="sendBtn">
                        <span class="material-symbols-rounded">arrow_upward</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Review button (hidden until complete) -->
        <button id="reviewButton" class="btn-primary w-full-btn mb-24 hidden" data-navigate="review.html">
            <span class="text-large font-bold">Review My Summary</span>
        </button>

    </div>

    <!-- =====================================================
         VOICE ORB OVERLAY
         Full-screen voice-to-voice interface.
         Hidden by default, shown when voice mode is active.
         ===================================================== -->
    <div id="voiceOrb" class="voice-orb-screen hidden">

        <!-- Top: AI response text -->
        <div class="orb-response-area">
            <p id="orbResponse" class="orb-response-text"></p>
        </div>

        <!-- Center: The orb -->
        <div class="orb-center">
            <div class="orb-container" id="orbContainer">
                <!-- Outer ripple rings (state-driven) -->
                <div class="orb-ring orb-ring-3"></div>
                <div class="orb-ring orb-ring-2"></div>
                <div class="orb-ring orb-ring-1"></div>
                <!-- Core orb -->
                <div class="orb-core">
                    <div class="orb-inner"></div>
                </div>
            </div>
            <p id="orbStateLabel" class="orb-state-label">Listening...</p>
        </div>

        <!-- Bottom: User transcript -->
        <div class="orb-transcript-area">
            <p id="orbTranscript" class="orb-transcript-text"></p>
        </div>

        <!-- Controls -->
        <div class="orb-controls">
            <button class="orb-close-btn" id="orbCloseBtn" onclick="document.getElementById('voiceModeBtn').click()">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>

    </div>

    <script src="../js/global.js"></script>
    <script src="../js/tts.js"></script>
    <script src="../js/chat.js"></script>
</body>
</html>
