<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talos Care - Chat</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0"
    />
  </head>
  <body class="chat-layout">
    <div class="mobile-container">
      <header class="app-header">
        <button class="back-btn" onclick="navigateTo('index.html')">
          <span class="material-symbols-rounded">arrow_back_ios_new</span>
        </button>
        <h1 style="display: flex; align-items: center; gap: 8px">
          Talos Assistant
          <span class="material-symbols-rounded icon-lock">lock</span>
        </h1>
        <div class="spacer"></div>
      </header>

      <main class="chat-area" id="chatContainer">
        <div class="chat-history" id="chatHistory">
          <div class="message ai-message">Hello :)</div>
          <div class="message ai-message">Can we start with screening</div>

          <div class="message user-message">go on</div>

          <div class="message ai-message">now i will need few of answers</div>
          <div class="message ai-message">
            Have you experienced any of the following symptoms in the last 48
            hours?
          </div>

          <div class="chat-choices" id="choiceButtons">
            <button class="btn-chat-choice" onclick="triggerEnding('Yes')">
              Yes
            </button>
            <button class="btn-chat-choice" onclick="triggerEnding('No')">
              No
            </button>
            <button class="btn-chat-choice" onclick="triggerEnding('Not sure')">
              Not sure
            </button>
          </div>
        </div>
      </main>

      <div class="chat-input-wrapper">
        <div id="activeInputArea">
          <div class="quick-replies">
            <button
              class="btn-quick-reply"
              onclick="triggerEnding('Prefer not to answer')"
            >
              Prefer not to answer
            </button>
            <button
              class="btn-quick-reply"
              onclick="triggerEnding('Skip this question')"
            >
              Skip this question
            </button>
          </div>

          <div class="input-box">
            <textarea id="chatInput" rows="1" placeholder="Type your answer..."></textarea>
            <button class="btn-mic" id="micButton"><span class="material-symbols-rounded">mic</span></button>
            <button class="btn-send" onclick="sendTypedMessage()">
              <span class="material-symbols-rounded">arrow_upward</span>
            </button>
            </div>
        </div>

        <button
          id="reviewButton"
          class="btn-primary"
          style="
            display: none;
            height: 60px;
            justify-content: center;
            border-radius: 30px;
            margin-bottom: 0;
          "
          onclick="navigateTo('review.html')"
        >
          <span style="font-size: 22px; font-weight: 600"
            >Review My Summary</span
          >
        </button>
      </div>
    </div>

    <script src="script.js"></script>
    </script>
    <script src="tts.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
