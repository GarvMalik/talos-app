<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Care - Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0" />
</head>
<body>

    <div class="mobile-container">
        
        <header class="app-header">
            <div class="spacer"></div>
            <h1>Talos Care</h1>
            <button class="settings-btn" onclick="navigateTo('settings.html')">
                <span class="material-symbols-rounded">settings</span>
            </button>
        </header>

        <main>
            <div class="greeting-section">
                <h2 id="greetingText">Good Morning!</h2>
                <p>How Can Talos Assist You Today?</p>
            </div>

            <button class="btn-primary" onclick="navigateTo('chat.html')">
                <div class="btn-text">
                    <h3>Start Screening</h3>
                    <p>Takes about 3-5 minutes.</p>
                </div>
                <span class="material-symbols-rounded">assignment</span>
            </button>

            <div class="secondary-actions">
                <button class="btn-secondary btn-past" onclick="navigateTo('past-summaries.html')">
                    <span class="material-symbols-rounded">history</span>
                    <h3>Past<br>Summaries</h3>
                </button>

                <button class="btn-secondary btn-emergency" onclick="navigateTo('emergency.html')">
                    <span class="material-symbols-rounded">emergency</span>
                    <h3>Emergency<br>Protocols</h3>
                </button>
            </div>
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
