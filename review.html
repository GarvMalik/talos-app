<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos Care - Review Summary</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,600,1,0" />
</head>
<body class="fixed-page">

    <div class="mobile-container">
        
        <header class="app-header">
            <button class="back-btn" onclick="navigateTo('chat.html')">
                <span class="material-symbols-rounded">arrow_back_ios_new</span>
            </button>
            <h1>Review Summary</h1>
            <div class="spacer"></div> 
        </header>

        <main class="review-main">
            <div class="review-intro">
                <p><strong class="text-green">Screening Complete.</strong> Please Review The Summary Below Before Sending It Securely To Your Doctor.</p>
            </div>

            <div class="intake-card">
                <div class="intake-header">
                    <h3>Clinical Intake Notes</h3>
                    <p><strong>Patient ID:</strong> #8472-A</p>
                </div>
                
               <div class="intake-body">
                    <h4>Question & Answer</h4>
                    <ul class="intake-list" id="summaryList">
                        <li style="font-style: italic; color: #666;">Analyzing chat history and generating clinical notes...</li>
                    </ul>
                </div>
            </div>

            <div class="review-actions">
                <button class="btn-action-light btn-red-text" onclick="navigateTo('index.html')">
                    Delete All And Start Over
                </button>
                <button class="btn-primary" style="height: 60px; justify-content: center; border-radius: 30px; margin-bottom: 0;" onclick="navigateTo('success.html')">
                    <span style="font-size: 22px; font-weight: 600;">Submit To Doctor</span>
                </button>
            </div>
        </main>

    </div>

    <script src="script.js"></script>
    <script>
        // Trigger the scroll check immediately for the header
        window.dispatchEvent(new Event('scroll'));
    </script>
    <script>
        // Trigger the scroll check immediately for the header
        window.dispatchEvent(new Event('scroll'));

        // ==========================================
        // DYNAMIC AI SUMMARY LOGIC
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            const summaryList = document.getElementById('summaryList');
            const historyData = localStorage.getItem('talosChatHistory');
            
            // NOTE: Paste your API Key here as well!
            const apiKey = "AIzaSyDlJH8F2_UUw20NDQ_kIuCr15b-ssK9Ypw"; 

            if (!historyData || historyData === "[]") {
                summaryList.innerHTML = '<li style="color: #BC4749;">No conversation data found. Please complete the screening first.</li>';
                return;
            }

            try {
                // Send the raw chat history to Gemini and ask it to summarize it
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: "You are a clinical summarizer. Read the chat history between the user and Talos. Extract the key medical information. Return ONLY a JSON array of objects, each with a 'topic' string and a 'detail' string." }] },
                        contents: [{ role: "user", parts: [{ text: historyData }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const summaryJSON = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // Clear the loading message and print the real summary
                summaryList.innerHTML = '';
                summaryJSON.forEach(item => {
                    summaryList.innerHTML += `<li><strong>${item.topic}:</strong> ${item.detail}</li>`;
                });

            } catch(e) {
                console.error(e);
                summaryList.innerHTML = '<li style="color: #BC4749;">Error generating summary. Could not connect to the AI.</li>';
            }
        });
    </script>
</body>
</html>
